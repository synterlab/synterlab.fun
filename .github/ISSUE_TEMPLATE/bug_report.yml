name: Bug Report
description: Report a bug on synterlab.space
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug!
  - type: input
    id: url
    attributes:
      label: Page / Section
      description: Which section of the page is affected?
      placeholder: e.g. Hero, SynTuner demo, Pricing
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to synterlab.space
        2. Scroll to ...
        3. Click on ...
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser + OS
      placeholder: e.g. Chrome 124 / macOS 14, Safari / iOS 17
    validations:
      required: true
  - type: dropdown
    id: device
    attributes:
      label: Device type
      options:
        - Desktop
        - Mobile
        - Tablet
    validations:
      required: true
