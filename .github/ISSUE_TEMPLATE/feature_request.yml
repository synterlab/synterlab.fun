name: Feature Request
description: Suggest an improvement for synterlab.space
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Got an idea to improve the site? We want to hear it.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the user problem or gap you are addressing.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Did you consider any other approaches?
